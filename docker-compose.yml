version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: xg_sports_db
    environment:
      POSTGRES_USER: xg_user
      POSTGRES_PASSWORD: xg_password
      POSTGRES_DB: xg_sports
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xg_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Flask
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xg_sports_backend
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: 'False'
      DATABASE_URL: postgresql://xg_user:xg_password@db:5432/xg_sports
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-your_api_key}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: gunicorn -w 4 -b 0.0.0.0:5000 backend.app:app

  # Frontend Nginx
  frontend:
    image: node:18-alpine
    container_name: xg_sports_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3001:3001"
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:5000/api

volumes:
  postgres_data:

networks:
  default:
    name: xg_sports_network
